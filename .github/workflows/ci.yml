name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    # Check-name kept stable as "bash -n (${{ matrix.os }})" so the main
    # branch-protection required-status-checks list survives this PR. The
    # step itself runs both bash -n AND shellcheck (#21); the name's
    # historical accuracy is the trade-off for not requiring a protection
    # update on every CI step expansion.
    name: bash -n (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck (Linux only — macOS runners pre-install shellcheck)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ensure shellcheck present on macOS (brew fallback for image churn)
        if: runner.os == 'macOS'
        run: command -v shellcheck >/dev/null || { brew install shellcheck && command -v shellcheck; }
      - name: verify shellcheck present
        run: command -v shellcheck && shellcheck --version | head -3
      - name: bash -n + shellcheck over shell sources
        run: |
          set -e
          # Enumerate via find — portable across bash 3.2 (macOS system bash)
          # and bash 4+ (Linux). `shopt -s globstar` would be the bash 4+
          # equivalent but is rejected by macOS-runner /bin/bash, which is
          # still 3.2 (Apple stopped shipping bash 4 over GPLv3). NUL-delimited
          # to survive any future path-with-spaces. See AC #4 in PR #20.
          files=()
          [ -f bin/claude-eng ] && files+=(bin/claude-eng)
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find scripts .claude/hooks -type f -name '*.sh' -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell files found — repo layout changed?"
            exit 1
          fi
          # Parse-check first (bash -n catches things shellcheck doesn't —
          # heredoc/parser corner cases — and runs in microseconds per file).
          for f in "${files[@]}"; do
            echo "→ bash -n $f"
            bash -n "$f"
          done
          # Then shellcheck the same set in one invocation. .shellcheckrc
          # records repo-wide silences (SC1090); inline `# shellcheck disable=`
          # carries per-line justifications. See SPEC §11.
          echo "→ shellcheck --severity=warning --shell=bash (${#files[@]} files)"
          shellcheck --severity=warning --shell=bash "${files[@]}"
        shell: bash

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: install jq (Linux only — macOS runners pre-install jq)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: verify jq present
        run: command -v jq && jq --version
      - name: run smoke
        run: ./scripts/test/smoke.sh

  mutation:
    name: mutation (kill-rate guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install jq (the inner smoke runs need jq)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: verify jq present
        run: command -v jq && jq --version
      - name: run mutation harness
        run: ./scripts/test/mutation.sh
