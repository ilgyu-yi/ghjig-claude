name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    name: bash -n (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: bash -n over shell sources
        run: |
          set -e
          # Enumerate via find — portable across bash 3.2 (macOS system bash)
          # and bash 4+ (Linux). `shopt -s globstar` would be the bash 4+
          # equivalent but is rejected by macOS-runner /bin/bash, which is
          # still 3.2 (Apple stopped shipping bash 4 over GPLv3). NUL-delimited
          # to survive any future path-with-spaces. See AC #4 in PR #20.
          files=()
          [ -f bin/claude-eng ] && files+=(bin/claude-eng)
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find scripts .claude/hooks -type f -name '*.sh' -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell files found — repo layout changed?"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "→ bash -n $f"
            bash -n "$f"
          done
        shell: bash

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: install jq (Linux only — macOS runners pre-install jq)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: verify jq present
        run: command -v jq && jq --version
      - name: run smoke
        run: ./scripts/test/smoke.sh
