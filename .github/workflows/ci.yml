name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    # Check-name kept stable as "bash -n (${{ matrix.os }})" so the main
    # branch-protection required-status-checks list survives this PR. The
    # step itself runs both bash -n AND shellcheck (#21); the name's
    # historical accuracy is the trade-off for not requiring a protection
    # update on every CI step expansion.
    name: bash -n (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # Version resolution is owned by scripts/lint.sh (pinned + SHA256-verified,
      # #545) — no OS-conditional apt/brew install here. Cache the resolver's
      # download dir so a green run never re-fetches from the release CDN
      # (CDN flake would be non-reproducible red-that-is-not-a-code-defect).
      - name: cache pinned shellcheck
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ghjig-shellcheck
          key: shellcheck-0.11.0-${{ runner.os }}-${{ runner.arch }}
      # Enumeration, per-file bash -n + shellcheck, and the Linux peak-RSS flag
      # all live in scripts/lint.sh so "clean locally" == "clean in CI". #545, SPEC §11.
      - name: bash -n + shellcheck over shell sources
        run: ./scripts/lint.sh
        shell: bash

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: install jq (Linux only — macOS runners pre-install jq)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: verify jq present
        run: command -v jq && jq --version
      - name: run smoke
        run: ./scripts/test/smoke.sh

  mutation:
    name: mutation (kill-rate guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install jq (the inner smoke runs need jq)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: verify jq present
        run: command -v jq && jq --version
      - name: run mutation harness
        run: ./scripts/test/mutation.sh
